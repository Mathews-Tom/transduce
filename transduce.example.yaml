# transduce reference configuration (v0).
#
# Mirrors the v0 subset of docs/system-design.md §Configuration. Copy to
# transduce.yaml and replace placeholder values. Fields are validated by
# Pydantic at service startup; missing required keys fail fast with an
# actionable error. Phase 2 introduces the ``modes`` allowlist with
# sha256 pinning; Phase 3 introduces ``observability`` (OTel) and
# ``language.detector`` (fasttext-langid).

service:
  host: 0.0.0.0
  port: 8080
  request_timeout_s: 30
  max_input_chars: 50000
  max_retries_default: 3

backends:
  default: ollama_qwen
  registry:
    - id: ollama_qwen
      provider: ollama
      endpoint: ${TRANSDUCE_OLLAMA_ENDPOINT:-http://localhost:11434}
      model: gemma4
      concurrency_limit: 1               # ollama serializes per model

verification:
  enabled: true
  default_cosine_min: 0.85
  max_retries: 3

language:
  default: en
